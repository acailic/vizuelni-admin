name: Bug Report
description: Create a report to help us improve Vizualni Admin
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the issue you encountered.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should have happened.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Describe what went wrong.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g., Windows 10, macOS 12.1, Ubuntu 20.04
      placeholder: Your OS and version
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js Version
      description: Run `node --version` to get this.
      placeholder: e.g., v18.17.0
    validations:
      required: true
  - type: input
    id: package_version
    attributes:
      label: Package Version
      description: Version of vizualni-admin you are using.
      placeholder: e.g., 0.1.0-beta.1
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem. You can drag and drop images here or paste links to images.
      placeholder: Add screenshots or links here.
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: Any additional information that might be helpful.