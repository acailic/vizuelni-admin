name: Feature request
description: Suggest an idea for this project
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: A clear and concise description of the problem you're trying to solve. What is currently missing or not working well?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution. How would you like to see this implemented?
      placeholder: "I think we should..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds? Please describe them here.
      placeholder: "I also considered..."
  - type: textarea
    id: use-cases
    attributes:
      label: Use Case Examples
      description: Provide specific examples of how this feature would be used. Include code snippets or scenarios if possible.
      placeholder: "For example, in a dashboard for..."
  - type: checkboxes
    id: category
    attributes:
      label: Feature Category
      description: Select all categories that apply to this feature request.
      options:
        - label: Visualization (charts, graphs, maps)
        - label: Data Processing (parsing, transformation, APIs)
        - label: Performance (optimization, loading, rendering)
        - label: UI/UX (interface, styling, accessibility)
        - label: Documentation (guides, examples, API reference)
        - label: Tooling (CLI, build tools, development experience)
        - label: Integrations (third-party services, platforms)
        - label: Other (please specify in description)
    validations:
      required: true
  - type: checkboxes
    id: contribute
    attributes:
      label: Willingness to Contribute
      description: Are you willing to help implement this feature?
      options:
        - label: I am willing to contribute code or documentation for this feature.
        - label: I am willing to test and provide feedback.
        - label: I am not able to contribute at this time, but I can provide more details if needed.
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references about the feature request here.