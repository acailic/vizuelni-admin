name: GitHub Copilot Integration

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - code-review
          - generate-tests
          - optimize-code
          - security-scan

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # === GitHub Copilot Code Review ===
  code-review:
    name: Copilot Code Review
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'code-review' || github.event.inputs.action == ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Copilot code review
        uses: github/copilot-code-review-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Analyze changes in the PR
          base-ref: ${{ github.base_ref }}
          head-ref: ${{ github.head_ref }}
          # Configure review focus
          review-types: |
            security
            performance
            maintainability
            best-practices
          # Output settings
          create-pr-comment: true
          fail-on-issues: false

      - name: Additional code analysis
        run: |
          echo "🔍 Running additional code analysis..."

          # Check for potential issues
          if grep -r "TODO\|FIXME\|XXX" src/ --include="*.ts" --include="*.tsx"; then
            echo "⚠️ Found TODO/FIXME comments that should be addressed"
          fi

          # Check for console.log statements
          if grep -r "console.log\|console.error\|console.warn" src/ --include="*.ts" --include="*.tsx"; then
            echo "⚠️ Found console statements that should be removed in production"
          fi

          # Check for hardcoded secrets
          if grep -r -i "password\|secret\|api_key\|token" src/ --include="*.ts" --include="*.tsx" | grep -v "//.*password"; then
            echo "⚠️ Potential hardcoded secrets detected"
          fi

  # === Generate Tests with Copilot ===
  generate-tests:
    name: Generate Tests with Copilot
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'generate-tests'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate unit tests for modified files
        run: |
          echo "🧪 Generating tests for modified files..."

          # Get modified files
          MODIFIED_FILES=$(git diff --name-only ${{ github.base_ref }}...${{ github.head_ref }} -- 'src/**/*.ts' 'src/**/*.tsx')

          for file in $MODIFIED_FILES; do
            if [[ -f "$file" ]]; then
              echo "Processing: $file"

              # Create corresponding test file
              TEST_FILE="tests/${file#src/}"
              TEST_FILE="${TEST_FILE%.ts}.test.ts"
              TEST_FILE="${TEST_FILE%.tsx}.test.tsx"

              mkdir -p "$(dirname "$TEST_FILE")"

              # Use Copilot CLI to generate tests (placeholder)
              echo "// Generated tests for $file" > "$TEST_FILE"
              echo "// TODO: Use Copilot CLI to generate actual tests" >> "$TEST_FILE"
              echo "Generated test file: $TEST_FILE"
            fi
          done

  # === Code Optimization with Copilot ===
  optimize-code:
    name: Code Optimization with Copilot
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'optimize-code'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Analyze and optimize code
        run: |
          echo "⚡ Analyzing code for optimization opportunities..."

          # Check for large functions
          echo "Checking for large functions (>50 lines)..."
          find src/ -name "*.ts" -o -name "*.tsx" | xargs wc -l | sort -n | tail -5

          # Check for complexity (simplified)
          echo "Checking for potential complexity issues..."

          # Bundle size analysis
          if command -v yarn build &>/dev/null; then
            echo "Building and analyzing bundle size..."
            yarn build
            du -sh dist/ || echo "No dist/ directory found"
          fi

  # === Security-focused Analysis ===
  security-scan:
    name: Security Analysis with Copilot
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'security-scan'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Security-focused code analysis
        run: |
          echo "🔒 Running security-focused analysis..."

          # Check for common security issues
          echo "Checking for common security patterns..."

          # Check for unsafe eval usage
          if grep -r "eval\|Function(" src/ --include="*.ts" --include="*.tsx"; then
            echo "⚠️ Potentially unsafe eval or Function constructor usage"
          fi

          # Check for innerHTML usage
          if grep -r "innerHTML\|outerHTML" src/ --include="*.ts" --include="*.tsx"; then
            echo "⚠️ Direct innerHTML usage - ensure proper sanitization"
          fi

          # Check for regex DoS potential
          if grep -r "RegExp\|new.*RegExp" src/ --include="*.ts" --include="*.tsx"; then
            echo "ℹ️ RegExp usage detected - ensure no ReDoS vulnerabilities"
          fi

  # === Comment on PR ===
  comment-on-pr:
    name: Add PR Comment
    runs-on: ubuntu-latest
    needs: [code-review]
    if: github.event_name == 'pull_request'
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const action = '${{ github.event.inputs.action || "code-review" }}';
            let comment = '';

            switch (action) {
              case 'code-review':
                comment = '🤖 **Copilot Code Review Complete**\n\nI\'ve analyzed this PR for potential issues, security vulnerabilities, and best practices. Please review the findings and address any concerns.\n\n✨ **Key Areas Analyzed:**\n- Security vulnerabilities\n- Performance implications\n- Code maintainability\n- TypeScript best practices';
                break;
              case 'generate-tests':
                comment = '🧪 **Test Generation Complete**\n\nI\'ve generated test templates for the modified components. Please review and enhance the generated tests with your specific use cases.';
                break;
              case 'optimize-code':
                comment = '⚡ **Code Optimization Analysis Complete**\n\nI\'ve analyzed the code for optimization opportunities. Check the workflow logs for detailed recommendations.';
                break;
              case 'security-scan':
                comment = '🔒 **Security Analysis Complete**\n\nI\'ve performed a security-focused analysis of the changes. Please review any security concerns that were identified.';
                break;
              default:
                comment = '🤖 **Copilot Analysis Complete**\n\nCode analysis has been completed. Please review the workflow logs for detailed findings.';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });