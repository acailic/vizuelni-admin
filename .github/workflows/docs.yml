name: Documentation & API Generation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to GitHub Pages?'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # === Generate API Documentation ===
  generate-api-docs:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build library
        run: yarn build

      - name: Generate TypeDoc API docs
        run: |
          npx typedoc --out docs/api src/index.ts \
            --entryPointStrategy expand \
            --includeVersion \
            --readme README.md \
            --excludePrivate \
            --excludeProtected \
            --excludeInternal \
            --sort source-order

      - name: Generate Storybook documentation
        run: |
          yarn build-storybook --output-dir docs/storybook

      - name: Upload API documentation
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/api/
          retention-days: 30

      - name: Upload Storybook
        uses: actions/upload-artifact@v4
        with:
          name: storybook
          path: docs/storybook/
          retention-days: 30

  # === Build Documentation Site ===
  build-docs-site:
    name: Build Documentation Site
    runs-on: ubuntu-latest
    needs: generate-api-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download documentation artifacts
        uses: actions/download-artifact@v4
        with:
          path: docs/
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install documentation dependencies
        run: |
          yarn add --dev vitepress @vitepress/theme-default

      - name: Build VitePress documentation
        run: |
          npx vitepress build docs

      - name: Generate documentation index
        run: |
          cat > docs/.vitepress/config.ts << 'EOF'
          import { defineConfig } from 'vitepress'

          export default defineConfig({
            title: 'Vizualni Admin',
            description: 'Serbian React Admin Library',

            themeConfig: {
              nav: [
                { text: 'Home', link: '/' },
                { text: 'API', link: '/api/' },
                { text: 'Examples', link: '/examples/' },
                { text: 'Storybook', link: '/storybook/' }
              ],

              sidebar: [
                {
                  text: 'Guide',
                  items: [
                    { text: 'Getting Started', link: '/guide/getting-started' },
                    { text: 'Installation', link: '/guide/installation' },
                    { text: 'Usage', link: '/guide/usage' }
                  ]
                },
                {
                  text: 'API Reference',
                  link: '/api/'
                },
                {
                  text: 'Examples',
                  items: [
                    { text: 'Basic Usage', link: '/examples/basic' },
                    { text: 'Serbian Localization', link: '/examples/serbian' },
                    { text: 'Form Validation', link: '/examples/validation' }
                  ]
                },
                {
                  text: 'Storybook',
                  link: '/storybook/'
                }
              ]
            }
          })
          EOF

      - name: Upload built documentation
        uses: actions/upload-artifact@v4
        with:
          name: built-docs
          path: docs/.vitepress/dist/
          retention-days: 30

  # === Deploy to GitHub Pages ===
  deploy-docs:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs-site
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download built documentation
        uses: actions/download-artifact@v4
        with:
          name: built-docs
          path: ./

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # === Deploy Storybook separately ===
  deploy-storybook:
    name: Deploy Storybook
    runs-on: ubuntu-latest
    needs: generate-api-docs
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Storybook
        uses: actions/download-artifact@v4
        with:
          name: storybook
          path: ./storybook-static

      - name: Deploy Storybook to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./storybook-static
          dest_dir: storybook

  # === Generate Changelog ===
  generate-changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          # Get the last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [[ -n "$LAST_TAG" ]]; then
            echo "## Changes since $LAST_TAG" > CHANGELOG_NEW.md
            echo "" >> CHANGELOG_NEW.md

            # Get commits since last tag
            git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG_NEW.md

            # Categorize changes
            echo "" >> CHANGELOG_NEW.md
            echo "### 🚀 Features" >> CHANGELOG_NEW.md
            git log $LAST_TAG..HEAD --grep="feat\|add\|new" --pretty=format:"- %s" >> CHANGELOG_NEW.md || echo "- No new features" >> CHANGELOG_NEW.md

            echo "" >> CHANGELOG_NEW.md
            echo "### 🐛 Fixes" >> CHANGELOG_NEW.md
            git log $LAST_TAG..HEAD --grep="fix\|bug" --pretty=format:"- %s" >> CHANGELOG_NEW.md || echo "- No bug fixes" >> CHANGELOG_NEW.md

            echo "" >> CHANGELOG_NEW.md
            echo "### 🔧 Maintenance" >> CHANGELOG_NEW.md
            git log $LAST_TAG..HEAD --grep="chore\|refactor\|deps" --pretty=format:"- %s" >> CHANGELOG_NEW.md || echo "- No maintenance changes" >> CHANGELOG_NEW.md

            # Update main changelog
            if [[ -f CHANGELOG.md ]]; then
              cat CHANGELOG_NEW.md > CHANGELOG_TEMP.md
              cat CHANGELOG.md >> CHANGELOG_TEMP.md
              mv CHANGELOG_TEMP.md CHANGELOG.md
            else
              mv CHANGELOG_NEW.md CHANGELOG.md
            fi
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "Initial release" >> CHANGELOG.md
          fi

      - name: Commit updated changelog
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changelog changes to commit"
          else
            git commit -m "docs: update changelog [skip ci]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}