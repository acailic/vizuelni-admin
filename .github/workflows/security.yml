name: 🔒 Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run npm audit
        run: yarn audit --level=moderate

      - name: Run audit with JSON output for PR comments
        if: github.event_name == 'pull_request'
        run: |
          yarn audit --json > audit-report.json || true
          echo "audit_report<<EOF" >> $GITHUB_OUTPUT
          cat audit-report.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        id: audit

      - name: Comment PR with audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const auditOutput = `${{ steps.audit.outputs.audit_report }}`;
            if (auditOutput && auditOutput.includes('"vulnerabilities"')) {
              const vulnerabilities = JSON.parse(auditOutput);
              const { metadata, vulnerabilities: vulns } = vulnerabilities;
              
              let comment = '## 🔒 Security Audit Results\n\n';
              comment += `**Dependencies:** ${metadata.dependencies}\n`;
              comment += `**Vulnerabilities:** ${vulns.total} total\n`;
              
              if (vulns.total > 0) {
                comment += '\n### 🚨 Vulnerability Breakdown:\n\n';
                if (vulns.high > 0) comment += `- 🔴 **High:** ${vulns.high}\n`;
                if (vulns.moderate > 0) comment += `- 🟡 **Moderate:** ${vulns.moderate}\n`;
                if (vulns.low > 0) comment += `- 🟢 **Low:** ${vulns.low}\n`;
                if (vulns.info > 0) comment += `- 🔵 **Info:** ${vulns.info}\n`;
                
                comment += '\n⚠️ **Please review and address vulnerabilities before merging.**';
              } else {
                comment += '\n✅ **No vulnerabilities found!**';
              }
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [ 'javascript' ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  security-headers-check:
    name: Security Headers Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build application
        run: yarn build:fast

      - name: Check security headers configuration
        run: |
          echo "🔍 Checking security headers configuration..."
          
          # Check if security headers are present in next.config.js
          if grep -q "X-Content-Type-Options" next.config.js; then
            echo "✅ X-Content-Type-Options found"
          else
            echo "❌ X-Content-Type-Options missing"
            exit 1
          fi
          
          if grep -q "X-Frame-Options" next.config.js; then
            echo "✅ X-Frame-Options found"
          else
            echo "❌ X-Frame-Options missing"
            exit 1
          fi
          
          if grep -q "Strict-Transport-Security" next.config.js; then
            echo "✅ HSTS found"
          else
            echo "❌ HSTS missing"
            exit 1
          fi
          
          if grep -q "Content-Security-Policy" next.config.js; then
            echo "✅ CSP found"
          else
            echo "❌ CSP missing"
            exit 1
          fi
          
          echo "🎉 All security headers are properly configured!"

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
