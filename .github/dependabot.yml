# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:

  # Enable version updates for npm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "acailic"
    assignees:
      - "acailic"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
      - "npm"
    allow:
      # Allow updates for all packages except those with breaking changes
      - dependency-type: "all"
    ignore:
      # Ignore major version updates for stability (manual review required)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      # Group MUI related updates
      mui-packages:
        patterns:
          - "@mui/*"
      # Group D3 related updates
      d3-packages:
        patterns:
          - "d3-*"
      # Group Next.js related updates
      nextjs-packages:
        patterns:
          - "next"
          - "@next/*"
      # Group development dependencies
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "acailic"
    assignees:
      - "acailic"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github_actions"
    allow:
      - dependency-type: "all"
    groups:
      # Group all GitHub Actions updates
      github-actions:
        patterns:
          - "*"
