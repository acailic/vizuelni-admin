coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 1%
      file:
        target: 70%
    patch:
      default:
        target: 80%
  ignore:
    - "app/__tests__/**"
    - "dist/**"
    - "build/**"
    - "node_modules/**"
    - ".next/**"
    - "*.config.*"
comment:
  layout: "header, diff, flags"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false
github_checks:
  annotations: true